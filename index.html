<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thabat Holding — Investment Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

  <!-- ── AUTH SCREEN ───────────────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-title">
        <div class="auth-logo">🏛️</div>
        <h1>Thabat Holding</h1>
        <p>Investment Management Dashboard</p>
      </div>
      <div class="form-group">
        <label for="username-input">Username</label>
        <input id="username-input" type="text" placeholder="Username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div id="auth-error" class="auth-error hidden"></div>
      <button id="login-btn" class="btn-signin">Sign In →</button>
      <p class="auth-hint">admin / thabat2024 &nbsp;·&nbsp; viewer / view123</p>
    </div>
  </div>

  <!-- ── MAIN APP ───────────────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- Navigation -->
    <nav id="app-nav">
      <div class="nav-logo">
        <div class="nav-logo-icon">🏛️</div>
        <span>Thabat Holding</span>
      </div>

      <button class="nav-btn" data-page="overview">📊 Overview</button>
      <button class="nav-btn" data-page="investments">📂 Investments</button>
      <button class="nav-btn" data-page="realestate">🏗️ Real Estate</button>
      <button class="nav-btn" data-page="shareholders">👥 Shareholders</button>
      <button class="nav-btn" data-page="structure">🌳 Structure</button>
      <button class="nav-btn" id="nav-admin-btn" data-page="admin" style="display:none">⚙️</button>

      <!-- Detail page back button (hidden on other pages) -->
      <button id="back-btn" class="nav-btn hidden" style="display:none">← Investments</button>

      <span id="nav-user-label" class="nav-user"></span>
      <button id="signout-btn" class="nav-signout">Sign Out</button>
    </nav>

    <!-- Page content -->
    <div id="main-content"></div>

  </div>

</body>
</html>
