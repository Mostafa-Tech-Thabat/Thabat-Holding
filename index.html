<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thabat Holding — Investment Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>

  <!-- ── AUTH SCREEN ───────────────────────────────────────────────────── -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-title">
        <div class="auth-logo">🏛️</div>
        <h1>Thabat Holding</h1>
        <p>Investment Management Dashboard</p>
      </div>
      <div class="form-group">
        <label for="username-input">Username</label>
        <input id="username-input" type="text" placeholder="Username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="Password" autocomplete="current-password">
      </div>
      <div id="auth-error" class="auth-error hidden"></div>
      <button id="login-btn" class="btn-signin">Sign In →</button>
    </div>
  </div>

  <!-- ── MAIN APP ───────────────────────────────────────────────────────── -->
  <div id="app" class="hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">🏛️</div>
          <span class="sidebar-logo-text">Thabat Holding</span>
        </div>
        <button id="sidebar-toggle" title="Collapse sidebar">‹</button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="structure">🌳 <span class="nav-label">Structure</span></button>
        <button class="nav-btn" data-page="overview">📊 <span class="nav-label">Overview</span></button>
        <button class="nav-btn" data-page="investments">📂 <span class="nav-label">Investments</span></button>
        <button class="nav-btn" data-page="realestate">🏗️ <span class="nav-label">Real Estate</span></button>
        <button class="nav-btn" data-page="shareholders">👥 <span class="nav-label">Shareholders</span></button>
        <button class="nav-btn hidden" id="nav-admin-btn" data-page="admin">⚙️ <span class="nav-label">Admin</span></button>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-icon">👤</div>
          <span id="nav-user-label" class="nav-label"></span>
        </div>
        <button id="signout-btn" class="sidebar-signout">
          <span class="signout-icon">⏏</span>
          <span class="nav-label">Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- Main area -->
    <div id="app-body">
      <!-- Top bar (for detail page back button) -->
      <div id="top-bar">
        <button id="back-btn" class="back-btn hidden">← Back to Investments</button>
      </div>
      <!-- Page content -->
      <div id="main-content"></div>
    </div>

  </div>

</body>
</html>
